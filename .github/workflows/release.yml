name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write      # create GitHub releases, upload assets, push version bump commit
  id-token: write      # obtain OIDC token for keyless attestation
  attestations: write  # write build provenance attestations

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0  # full history needed so the bump step can switch to main

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod

      - name: Bump plugin.json version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Checking out a tag leaves HEAD detached — switch to main so we can push.
          git fetch origin main
          git checkout main
          VERSION="${TAG#v}"  # strip leading 'v': v0.1.0 → 0.1.0
          jq --arg v "$VERSION" '.version = $v' plugin.json > plugin.json.tmp
          mv plugin.json.tmp plugin.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugin.json
          # Skip the commit if plugin.json was already at the right version.
          # [skip ci] prevents this commit from re-triggering the workflow.
          git diff --cached --quiet || git commit -m "chore: bump plugin.json to $TAG [skip ci]"
          git push origin main

      - name: Build binaries
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          # -trimpath removes local build paths for reproducible binaries.
          LDFLAGS="-X main.version=$TAG"
          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            GOOS="${platform%/*}" GOARCH="${platform#*/}" \
              go build -trimpath -ldflags "$LDFLAGS" \
              -o "dist/togi-${platform%/*}-${platform#*/}" .
          done

      - name: Generate checksums
        run: sha256sum dist/togi-* > dist/sha256sums.txt

      - name: Attest build provenance
        # Links each binary to this workflow run via Sigstore — verified by `togi install`.
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: dist/togi-*

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            dist/togi-* \
            dist/sha256sums.txt
